name: build-raspberrypi-24.10-ImmortalWrt

on:
  workflow_dispatch:
    inputs:
      profile:
        type: choice
        description: "请选择路由器型号"
        required: true
        options:
          - rpi
          - rpi-2
          - rpi-3
          - rpi-4
          - rpi-5
        default: rpi-4
      include_docker:
        description: |
          是否编译 Docker 插件
        required: true
        default: 'no'
        type: choice
        options:
          - 'yes'
          - 'no'
      size:
        description: '请输入要编译固件大小 单位(MB)'
        required: true
        default: '1024'


jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set executable permissions
        run: |
          chmod +x ${{ github.workspace }}/raspberrypi/build.sh

      - name: Build raspberrypi ImmortalWrt 24.10
        run: |
          profiles="${{ github.event.inputs.profile }}"
          if [ "$profiles" = "rpi" ]; then
            tag=bcm27xx-bcm2708-openwrt-24.10
          elif [ "$profiles" = "rpi-2" ]; then
            tag=bcm27xx-bcm2709-openwrt-24.10
          elif [ "$profiles" = "rpi-3" ]; then
            tag=bcm27xx-bcm2710-openwrt-24.10
          elif [ "$profiles" = "rpi-4" ]; then
            tag=bcm27xx-bcm2711-openwrt-24.10
          elif [ "$profiles" = "rpi-5" ]; then
            tag=bcm27xx-bcm2712-openwrt-24.10
          fi
          include_docker="${{ github.event.inputs.include_docker }}"
          size="${{ github.event.inputs.size }}"
          IFS=',' read -r -a profile_array <<< "$profiles"
          for profile in "${profile_array[@]}"; do
            echo "Building for profile: $profile"
            
            docker run --rm -i \
              --user root \
              -v "${{ github.workspace }}/bin:/home/build/immortalwrt/bin" \
              -v "${{ github.workspace }}/files:/home/build/immortalwrt/files" \
              -v "${{ github.workspace }}/raspberrypi/24.10/build.sh:/home/build/openwrt/build.sh" \
              -e PROFILE=$profile \
              -e INCLUDE_DOCKER=$include_docker \
              -e ROOTSIZE=$size \
              immortalwrt/imagebuilder:tag /bin/bash /home/build/openwrt/build.sh
          done

      - name: List bin dir
        run: |
          ls ${{ github.workspace }}/bin
      
      - name: Create info
        run: |
          if [ "${{ github.event.inputs.include_docker }}" == "yes" ]; then
            extra_content="### 默认带docker"
            echo -e "\n $extra_content" >> ${{ github.workspace }}/info.md
          else
            echo -e "NO docker"
          fi
          
      - name: Create GitHub Release Info
        uses: softprops/action-gh-release@v2.1.0
        with:
          tag_name: Autobuild-raspberrypi
          name: immortalwrt-raspberrypi
          body_path: ${{ github.workspace }}/info.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload ImmortalWrt as release assets
        uses: softprops/action-gh-release@v2.1.0
        with:
          tag_name: Autobuild-raspberrypi
          files: |
            ${{ github.workspace }}/bin/*.img.gz
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
